# General
spring.application.name=truyen

# Server
server.port=8080

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

# Logging
logging.level.com.example.truyen=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS}
spring.kafka.properties.schema.registry.url=${KAFKA_SCHEMA_REGISTRY}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# Redis Connection Pool
spring.data.redis.jedis.pool.enabled=true
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.jedis.pool.max-wait=-1ms

# Cache (Redis)
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000ms
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true

# Async Thread Pool
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=async-

# Scheduling Thread Pool
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=scheduling

# MinIO
minio.url=${MINIO_URL}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# VNPay
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.url=${VNPAY_URL}
vnpay.return-url=${VNPAY_RETURN_URL}